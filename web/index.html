<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mhanga · Bantu Crossword</title>
<meta name="description" content="A grapheme-aware crossword puzzle for Bantu languages — digraphs like ng', zv and ch each fill a single cell." />
<style>
  :root {
    --bg: #0b1120;
    --bg2: #0f1b34;
    --glass: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --ink: #e8eefc;
    --muted: #93a1bf;
    --accent: #5eead4;
    --accent2: #818cf8;
    --cell: #16233f;
    --cell-active: #1e3a5f;
    --cell-word: #182a4d;
    --good: #34d399;
    --bad: #fb7185;
    --shadow: 0 10px 40px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 20% -10%, #15294d 0%, var(--bg) 55%) , var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 14px 120px;
  }
  header { width: 100%; max-width: 1000px; }
  .brand { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 1.6rem; margin: 0; letter-spacing: -0.5px;
       background: linear-gradient(90deg, var(--accent), var(--accent2));
       -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tag { color: var(--muted); font-size: 0.85rem; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0 8px; align-items: center; }
  select, button {
    font: inherit; color: var(--ink); cursor: pointer;
    background: var(--glass); border: 1px solid var(--glass-border);
    padding: 9px 14px; border-radius: 12px; backdrop-filter: blur(8px);
    transition: transform .08s ease, background .2s ease, border-color .2s;
  }
  button:hover, select:hover { border-color: var(--accent); }
  button:active { transform: scale(0.96); }
  button.primary { background: linear-gradient(90deg, rgba(94,234,212,.18), rgba(129,140,248,.18)); }
  .layout { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 12px; }
  @media (min-width: 820px) { .layout { grid-template-columns: auto 1fr; align-items: start; } }
  .board-wrap {
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px;
    padding: 14px; box-shadow: var(--shadow); backdrop-filter: blur(10px);
    overflow: auto; align-self: start;
  }
  table { border-collapse: collapse; margin: 0 auto; }
  td {
    width: 42px; height: 42px; padding: 0; text-align: center; position: relative;
    border: 1px solid rgba(0,0,0,0.45);
  }
  td.block { background: transparent; border-color: transparent; }
  td.cell { background: var(--cell); cursor: pointer; }
  td.cell.in-word { background: var(--cell-word); }
  td.cell.active { background: var(--cell-active); box-shadow: inset 0 0 0 2px var(--accent); }
  td.cell.good { color: var(--good); }
  td.cell.bad { color: var(--bad); }
  td .num { position: absolute; top: 1px; left: 3px; font-size: 9px; color: var(--muted); line-height: 1; }
  td .val { font-size: 17px; font-weight: 600; letter-spacing: -0.5px; text-transform: uppercase; }
  .side { display: flex; flex-direction: column; gap: 18px; }
  .clues { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px 18px; backdrop-filter: blur(10px); }
  .clues h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin: 0 0 10px; }
  .clue { display: flex; gap: 8px; padding: 6px 8px; border-radius: 8px; cursor: pointer; font-size: .92rem; line-height: 1.35; }
  .clue:hover { background: rgba(255,255,255,0.05); }
  .clue.active { background: rgba(94,234,212,0.12); }
  .clue.solved { color: var(--muted); }
  .clue.solved .cnum { text-decoration: line-through; }
  .clue .cnum { color: var(--accent2); font-weight: 700; min-width: 20px; }
  .status { font-size: .9rem; color: var(--muted); min-height: 1.2em; }
  .status.win { color: var(--good); font-weight: 700; }
  /* on-screen grapheme keypad — lets players enter digraphs that have no single key */
  .keypad { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
    background: rgba(10,16,30,0.92); border-top: 1px solid var(--glass-border); backdrop-filter: blur(14px);
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; z-index: 50; }
  .keypad button { padding: 10px 12px; min-width: 40px; border-radius: 10px; font-size: 1rem; }
  .keypad .di { color: var(--accent); border-color: rgba(94,234,212,0.35); }
  .keypad .util { color: var(--accent2); }
  .legend { font-size: .8rem; color: var(--muted); margin-top: 6px; }
  .legend b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Mhanga</h1>
    <span class="tag">a grapheme-aware crossword for Bantu languages</span>
  </div>
  <div class="controls">
    <select id="lang" aria-label="Language"></select>
    <button id="new" class="primary">New puzzle</button>
    <button id="check">Check</button>
    <button id="reveal">Reveal word</button>
    <button id="clear">Clear</button>
  </div>
  <div id="status" class="status"></div>
</header>

<div class="layout">
  <div class="board-wrap"><table id="board"></table>
    <div class="legend">Each cell holds one <b>grapheme</b>. Digraphs like <b>ng'</b>, <b>zv</b>, <b>ch</b> fill a single square — tap them on the keypad below.</div>
  </div>
  <div class="side">
    <div class="clues"><h2>Across</h2><div id="across"></div></div>
    <div class="clues"><h2>Down</h2><div id="down"></div></div>
  </div>
</div>

<div class="keypad" id="keypad"></div>

<script>
"use strict";

/* ============================================================
   1. LANGUAGE DATA  (config + clued wordlists, embedded)
   ============================================================ */
const LANGUAGES = {
  Shona: {
    config: {
      language: "Shona",
      atomic_graphemes: ["ch","sh","sv","zv","ng","mb","nd","nj","ny","nz","mh","pf","ts","dz","vh"],
      ignore_casing: true, strip_diacritics: false, preserve_marks: []
    },
    words: [
      ["chikoro","Nzvimbo inodzidzirwa vana (school)"],
      ["shamwari","Munhu waunoda uye waunovimba naye (friend)"],
      ["ngoma","Chiridzwa chinorohwa (drum)"],
      ["mbira","Chiridzwa cheChiShona chine simbi (thumb piano)"],
      ["nyika","Pasi rinogarwa nevanhu (country / land)"],
      ["svondo","Mazuva manomwe (week / Sunday)"],
      ["zvombo","Zvinhu zvinoshandiswa kurwa (weapons / tools)"],
      ["ndima","Chikamu chebasa rekurima (a portion of field)"],
      ["tsanga","Tsanga yembeu (a grain / seed)"],
      ["amai","Mubereki wechikadzi (mother)"],
      ["baba","Mubereki wechirume (father)"],
      ["nzira","Penzira inofambwa (path / road)"]
    ]
  },
  Swahili: {
    config: {
      language: "Swahili",
      atomic_graphemes: ["ng'","ch","sh","gh","kh","th","dh","ng","ny","mb","nd"],
      ignore_casing: true, strip_diacritics: true, preserve_marks: ["'"]
    },
    words: [
      ["shule","Mahali wanafunzi husoma (school)"],
      ["chakula","Kitu tunachokula (food)"],
      ["ng'ombe","Mnyama anayetoa maziwa (cow)"],
      ["ghali","Chenye bei kubwa (expensive)"],
      ["rafiki","Mtu unayempenda na kumwamini (friend)"],
      ["ndege","Husafiri angani (bird / aeroplane)"],
      ["thelathini","Idadi baada ya ishirini na tisa (thirty)"],
      ["shamba","Mahali pa kulima (farm / field)"],
      ["nyumba","Mahali pa kuishi (house)"],
      ["mbingu","Anga la juu (sky / heaven)"],
      ["dhahabu","Madini ya thamani ya rangi ya manjano (gold)"],
      ["chai","Kinywaji cha moto (tea)"]
    ]
  }
};

/* ============================================================
   2. TOKENIZER  (grapheme-aware, maximal-munch)
   ============================================================ */
class Language {
  constructor(cfg) {
    this.name = cfg.language;
    this.ignoreCasing = cfg.ignore_casing;
    this.stripDiacritics = cfg.strip_diacritics;
    this.preserve = cfg.preserve_marks || [];
    // longest grapheme first => "ng'" beats "ng" beats "n"
    this.ordered = [...new Set((cfg.atomic_graphemes||[]).map(g => this.normalize(g)))]
      .sort((a,b) => b.length - a.length);
  }
  normalize(text) {
    if (this.ignoreCasing) text = text.toLowerCase();
    if (this.stripDiacritics) {
      const sent = {};
      this.preserve.forEach((m,i) => { sent[m] = String.fromCharCode(0xE000+i); });
      for (const m in sent) text = text.split(m).join(sent[m]);
      text = text.normalize("NFD").replace(/\p{Mn}/gu, "").normalize("NFC");
      for (const m in sent) text = text.split(sent[m]).join(m);
    }
    return text;
  }
  tokenize(word) {
    const t = this.normalize(word); const out = []; let i = 0;
    while (i < t.length) {
      let matched = null;
      for (const g of this.ordered) { if (t.startsWith(g, i)) { matched = g; break; } }
      if (matched) { out.push(matched); i += matched.length; }
      else { out.push(t[i]); i += 1; }
    }
    return out;
  }
}

/* ============================================================
   3. GENERATOR  (greedy crossing placement + repeated sweep)
   ============================================================ */
const ACROSS = "across", DOWN = "down";

function generate(entries, lang) {
  let toks = entries.map(e => ({entry: e, tokens: lang.tokenize(e[0])})).filter(x => x.tokens.length);
  toks.sort((a,b) => b.tokens.length - a.tokens.length);

  const cells = new Map();           // "r,c" -> token
  const placements = [];
  const key = (r,c) => r + "," + c;

  function canPlace(tokens, row, col, dir) {
    let crossings = 0;
    const [dr,dc] = dir === ACROSS ? [0,1] : [1,0];
    if (cells.has(key(row-dr, col-dc))) return -1;
    if (cells.has(key(row+dr*tokens.length, col+dc*tokens.length))) return -1;
    for (let i=0;i<tokens.length;i++) {
      const r=row+dr*i, c=col+dc*i, ex = cells.get(key(r,c));
      if (ex !== undefined) { if (ex !== tokens[i]) return -1; crossings++; }
      else {
        const [a,b] = dir===ACROSS ? [[r-1,c],[r+1,c]] : [[r,c-1],[r,c+1]];
        if (cells.has(key(a[0],a[1])) || cells.has(key(b[0],b[1]))) return -1;
      }
    }
    if (placements.length && crossings===0) return -1;
    return crossings;
  }
  function commit(p) {
    p.tokens.forEach((t,i) => {
      const r = p.dir===ACROSS ? p.row : p.row+i;
      const c = p.dir===ACROSS ? p.col+i : p.col;
      cells.set(key(r,c), t);
    });
    placements.push(p);
  }
  function best(entry, tokens) {
    let cands = [];
    for (const [k, gtok] of cells) {
      const [gr,gc] = k.split(",").map(Number);
      for (let i=0;i<tokens.length;i++) {
        if (tokens[i] !== gtok) continue;
        for (const dir of [ACROSS,DOWN]) {
          const row = dir===ACROSS ? gr : gr-i;
          const col = dir===ACROSS ? gc-i : gc;
          const score = canPlace(tokens,row,col,dir);
          if (score>0) {
            const cr = dir===ACROSS ? row : row+(tokens.length>>1);
            const cc = dir===ACROSS ? col+(tokens.length>>1) : col;
            cands.push({score, compact: -(Math.abs(cr)+Math.abs(cc)), p:{entry,tokens,row,col,dir}});
          }
        }
      }
    }
    if (!cands.length) return null;
    cands.sort((a,b) => b.score-a.score || b.compact-a.compact);
    return cands[0].p;
  }

  commit({entry: toks[0].entry, tokens: toks[0].tokens, row:0, col:0, dir:ACROSS});
  let rem = toks.slice(1), progress = true;
  while (rem.length && progress) {
    progress = false; const left = [];
    for (const {entry, tokens} of rem) {
      const p = best(entry, tokens);
      if (p) { commit(p); progress = true; } else left.push({entry, tokens});
    }
    rem = left;
  }
  number(placements);
  return {cells, placements};
}

function number(placements) {
  const starts = new Map();
  for (const p of placements) {
    const k = p.row + "," + p.col;
    if (!starts.has(k)) starts.set(k, []);
    starts.get(k).push(p);
  }
  const keys = [...starts.keys()].sort((a,b) => {
    const [ar,ac]=a.split(",").map(Number), [br,bc]=b.split(",").map(Number);
    return ar-br || ac-bc;
  });
  keys.forEach((k,idx) => starts.get(k).forEach(p => p.number = idx+1));
}

/* ============================================================
   4. GAME STATE + RENDERING
   ============================================================ */
let lang, puzzle, guesses, bounds, active = null; // active = {placement, idx}
let pending = ""; // partial grapheme being composed via the physical keyboard (IME-style)
function resetCompose(){ pending = ""; }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function newPuzzle(langName) {
  const data = LANGUAGES[langName];
  lang = new Language(data.config);
  // pick a random subset (7) for variety each round, longest-biased
  const words = shuffle(data.words).slice(0, 8);
  puzzle = generate(words, lang);
  guesses = new Map();              // "r,c" -> typed grapheme
  for (const k of puzzle.cells.keys()) guesses.set(k, "");
  const rs=[...puzzle.cells.keys()].map(k=>+k.split(",")[0]);
  const cs=[...puzzle.cells.keys()].map(k=>+k.split(",")[1]);
  bounds = {rmin:Math.min(...rs), rmax:Math.max(...rs), cmin:Math.min(...cs), cmax:Math.max(...cs)};
  active = null;
  setStatus(`${puzzle.placements.length} words · tap a square or clue to begin`);
  render(); renderClues(); renderKeypad();
}

function numberMap() {
  const m = new Map();
  for (const p of puzzle.placements) { const k=p.row+","+p.col; if(!m.has(k)) m.set(k,p.number); }
  return m;
}
function wordCellsKeys(p){
  const out=[]; for(let i=0;i<p.tokens.length;i++){
    const r=p.dir===ACROSS?p.row:p.row+i, c=p.dir===ACROSS?p.col+i:p.col; out.push(r+","+c);
  } return out;
}

function render() {
  const t = document.getElementById("board");
  const nums = numberMap();
  const activeKeys = active ? new Set(wordCellsKeys(active.placement)) : new Set();
  let html = "";
  for (let r=bounds.rmin; r<=bounds.rmax; r++) {
    html += "<tr>";
    for (let c=bounds.cmin; c<=bounds.cmax; c++) {
      const k = r+","+c;
      if (!puzzle.cells.has(k)) { html += '<td class="block"></td>'; continue; }
      const cls = ["cell"];
      if (activeKeys.has(k)) cls.push("in-word");
      if (active && active.placement.row+(active.placement.dir===ACROSS?0:active.idx)===r &&
          active.placement.col+(active.placement.dir===ACROSS?active.idx:0)===c) cls.push("active");
      const num = nums.get(k);
      html += `<td class="${cls.join(' ')}" data-k="${k}">`+
              (num?`<span class="num">${num}</span>`:"")+
              `<span class="val">${guesses.get(k)||""}</span></td>`;
    }
    html += "</tr>";
  }
  t.innerHTML = html;
  t.querySelectorAll("td.cell").forEach(td => td.onclick = () => onCellClick(td.dataset.k));
}

function onCellClick(k) {
  // find words through this cell; toggle direction if re-clicking active word
  const through = puzzle.placements.filter(p => wordCellsKeys(p).includes(k));
  if (!through.length) return;
  let chosen = through[0];
  if (active && through.length>1 && wordCellsKeys(active.placement).includes(k)) {
    chosen = through.find(p => p !== active.placement) || through[0];
  } else if (active && through.includes(active.placement)) {
    chosen = active.placement;
  }
  const idx = wordCellsKeys(chosen).indexOf(k);
  active = {placement: chosen, idx};
  resetCompose();
  render(); highlightClue();
}

function renderClues() {
  const mk = (dir, el) => {
    const items = puzzle.placements.filter(p=>p.dir===dir).sort((a,b)=>a.number-b.number);
    document.getElementById(el).innerHTML = items.map(p =>
      `<div class="clue" data-num="${p.number}" data-dir="${dir}">`+
      `<span class="cnum">${p.number}</span><span>${p.entry[1]} <b>(${p.tokens.length})</b></span></div>`
    ).join("");
  };
  mk(ACROSS,"across"); mk(DOWN,"down");
  document.querySelectorAll(".clue").forEach(c => c.onclick = () => {
    const p = puzzle.placements.find(x=>x.number==c.dataset.num && x.dir===c.dataset.dir);
    active = {placement:p, idx:0}; resetCompose(); render(); highlightClue();
  });
}

function highlightClue() {
  document.querySelectorAll(".clue").forEach(c => {
    const p = puzzle.placements.find(x=>x.number==c.dataset.num && x.dir===c.dataset.dir);
    c.classList.toggle("active", active && p===active.placement);
    c.classList.toggle("solved", isSolved(p));
  });
}

function isSolved(p){ return wordCellsKeys(p).every(k => (guesses.get(k)||"")===puzzle.cells.get(k)); }

/* ---- input: on-screen keypad + physical keyboard ---- */
function renderKeypad() {
  const vowels = ["a","e","i","o","u"];
  const consonants = "bdfghjklmnprstvwyz".split("");
  const digraphs = lang.ordered.slice().sort();
  const kp = document.getElementById("keypad");
  const mk = (label, cls="") => `<button class="${cls}" data-g="${label}">${label}</button>`;
  kp.innerHTML =
    vowels.map(v=>mk(v)).join("") +
    consonants.map(c=>mk(c)).join("") +
    digraphs.map(d=>mk(d,"di")).join("") +
    mk("⌫","util del") + mk("→","util skip");
  kp.querySelectorAll("button").forEach(b => b.onclick = () => {
    const g = b.dataset.g;
    if (g==="⌫") backspace(); else if (g==="→") advance(1); else typeGrapheme(g);
  });
}

// Direct commit — used by the on-screen keypad (digraph tiles are explicit/literal).
function typeGrapheme(g) {
  if (!active) return;
  resetCompose();
  const keys = wordCellsKeys(active.placement);
  if (active.idx >= keys.length) return;
  guesses.set(keys[active.idx], g);
  advance(1); checkWin(false); render(); highlightClue();
}

// IME-style greedy composition for the physical keyboard: lets a player type
// "n","g" and get the single grapheme "ng", with the apostrophe upgrading
// "ng" -> "ng'". A keystroke either (a) extends a still-growable prefix and
// previews in place, (b) completes a maximal grapheme and advances, or (c)
// can't combine, so the pending grapheme commits and the key reprocesses fresh.
function composeKey(k) {
  if (!active) return;
  const keys = wordCellsKeys(active.placement);
  if (active.idx >= keys.length) return;
  const cur = keys[active.idx];
  const cand = pending + k;
  const isGrapheme = lang.ordered.includes(cand);
  const canGrow = lang.ordered.some(g => g.length > cand.length && g.startsWith(cand));

  if (canGrow) {                       // (a) might still extend (e.g. "n" -> "ng", "ng" -> "ng'")
    pending = cand;
    guesses.set(cur, cand);            // preview without advancing
    render(); highlightClue();
    return;
  }
  if (isGrapheme) {                    // (b) maximal complete grapheme -> commit + advance
    guesses.set(cur, cand);
    resetCompose();
    advance(1); checkWin(false); render(); highlightClue();
    return;
  }
  if (pending === "") {                // (c1) standalone single character
    guesses.set(cur, k);
    advance(1); checkWin(false); render(); highlightClue();
    return;
  }
  // (c2) pending can't combine with k: commit pending, then reprocess k on the next cell.
  guesses.set(cur, pending);
  resetCompose();
  advance(1); render();
  composeKey(k);
}
function backspace() {
  if (!active) return;
  const keys = wordCellsKeys(active.placement);
  if ((guesses.get(keys[active.idx])||"") === "" && active.idx>0) active.idx--;
  guesses.set(keys[active.idx], "");
  render(); highlightClue();
}
function advance(n){
  if(!active) return;
  const len = wordCellsKeys(active.placement).length;
  active.idx = Math.max(0, Math.min(active.idx + n, len - 1));
}

document.addEventListener("keydown", e => {
  if (!active) return;
  if (e.key === "Backspace") { e.preventDefault(); resetCompose(); backspace(); return; }
  if (e.key === "ArrowRight" || e.key === "ArrowDown") { resetCompose(); advance(1); render(); return; }
  if (e.key === "ArrowLeft" || e.key === "ArrowUp") { resetCompose(); active.idx=Math.max(0,active.idx-1); render(); return; }
  if (/^[a-zA-Z']$/.test(e.key)) {
    composeKey(e.key.toLowerCase());  // IME-style: builds digraphs from single keystrokes
  }
});

/* ---- buttons ---- */
function checkWin(announce=true) {
  const done = puzzle.placements.every(isSolved);
  if (done) { setStatus("🎉 Wakunda! Puzzle solved.", true); }
  else if (announce) {
    let wrong=0, filled=0;
    for (const [k,v] of guesses) { if(v){ filled++; if(v!==puzzle.cells.get(k)) wrong++; } }
    setStatus(wrong? `${wrong} cell(s) are wrong.` : `Looking good — ${filled} cells filled, keep going.`);
    // flash correctness
    document.querySelectorAll("td.cell").forEach(td=>{
      const k=td.dataset.k, v=guesses.get(k);
      td.classList.remove("good","bad");
      if(v) td.classList.add(v===puzzle.cells.get(k)?"good":"bad");
    });
    setTimeout(()=>document.querySelectorAll("td.cell").forEach(td=>td.classList.remove("good","bad")),900);
  }
  return done;
}
function setStatus(msg, win=false){ const s=document.getElementById("status"); s.textContent=msg; s.classList.toggle("win",win); }

document.getElementById("check").onclick = () => checkWin(true);
document.getElementById("clear").onclick = () => { for(const k of guesses.keys()) guesses.set(k,""); render(); highlightClue(); setStatus("Cleared."); };
document.getElementById("reveal").onclick = () => {
  if(!active) { setStatus("Pick a word first."); return; }
  wordCellsKeys(active.placement).forEach(k => guesses.set(k, puzzle.cells.get(k)));
  render(); highlightClue(); checkWin(false);
};
document.getElementById("new").onclick = () => newPuzzle(document.getElementById("lang").value);
const sel = document.getElementById("lang");
Object.keys(LANGUAGES).forEach(n => { const o=document.createElement("option"); o.value=o.textContent=n; sel.appendChild(o); });
sel.onchange = () => newPuzzle(sel.value);

/* boot */
newPuzzle("Shona");
</script>
</body>
